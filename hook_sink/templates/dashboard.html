<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hook-sink Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d1117; color: #c9d1d9; }
        .header { background: #161b22; border-bottom: 1px solid #30363d; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 20px; color: #58a6ff; }
        .header .stats { font-size: 14px; color: #8b949e; }
        .container { display: flex; height: calc(100vh - 57px); }
        .sidebar { width: 400px; border-right: 1px solid #30363d; overflow-y: auto; }
        .main { flex: 1; overflow-y: auto; padding: 24px; }
        .controls { padding: 12px 16px; border-bottom: 1px solid #30363d; display: flex; gap: 8px; }
        .controls input, .controls select { background: #0d1117; border: 1px solid #30363d; color: #c9d1d9; padding: 6px 10px; border-radius: 6px; font-size: 13px; }
        .controls input { flex: 1; }
        .controls button { background: #21262d; border: 1px solid #30363d; color: #c9d1d9; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; }
        .controls button:hover { background: #30363d; }
        .controls button.danger { color: #f85149; }
        .webhook-item { padding: 12px 16px; border-bottom: 1px solid #21262d; cursor: pointer; transition: background 0.15s; }
        .webhook-item:hover { background: #161b22; }
        .webhook-item.active { background: #1f2937; border-left: 3px solid #58a6ff; }
        .webhook-item .method { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: 600; margin-right: 8px; }
        .method-POST { background: #238636; color: #fff; }
        .method-PUT { background: #d29922; color: #000; }
        .method-PATCH { background: #a371f7; color: #fff; }
        .method-DELETE { background: #f85149; color: #fff; }
        .method-GET { background: #58a6ff; color: #000; }
        .webhook-item .path { font-family: monospace; font-size: 13px; }
        .webhook-item .meta { font-size: 11px; color: #8b949e; margin-top: 4px; }
        .detail-section { background: #161b22; border: 1px solid #30363d; border-radius: 8px; margin-bottom: 16px; overflow: hidden; }
        .detail-section h3 { padding: 12px 16px; background: #21262d; font-size: 14px; border-bottom: 1px solid #30363d; display: flex; justify-content: space-between; align-items: center; }
        .detail-section pre { padding: 16px; font-family: 'Fira Code', monospace; font-size: 13px; white-space: pre-wrap; word-break: break-all; max-height: 400px; overflow-y: auto; }
        .headers-table { width: 100%; border-collapse: collapse; }
        .headers-table td { padding: 6px 16px; border-bottom: 1px solid #21262d; font-size: 13px; }
        .headers-table td:first-child { color: #58a6ff; font-weight: 500; width: 200px; font-family: monospace; }
        .copy-btn { background: none; border: 1px solid #30363d; color: #8b949e; padding: 2px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; }
        .copy-btn:hover { color: #c9d1d9; background: #30363d; }
        .replay-section { padding: 16px; }
        .replay-section input { width: 100%; background: #0d1117; border: 1px solid #30363d; color: #c9d1d9; padding: 8px 12px; border-radius: 6px; font-family: monospace; margin-bottom: 8px; }
        .replay-btn { background: #238636; border: none; color: #fff; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 600; }
        .replay-btn:hover { background: #2ea043; }
        .replay-result { margin-top: 12px; padding: 12px; background: #0d1117; border-radius: 6px; font-size: 13px; font-family: monospace; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; }
        .badge-provider { background: #1f6feb33; color: #58a6ff; }
        .empty-state { text-align: center; padding: 60px 24px; color: #8b949e; }
        .empty-state h2 { font-size: 24px; margin-bottom: 12px; color: #c9d1d9; }
        .empty-state code { background: #21262d; padding: 4px 8px; border-radius: 4px; font-size: 14px; }
        .auto-refresh { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #8b949e; }
        .auto-refresh .dot { width: 8px; height: 8px; border-radius: 50%; background: #238636; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    </style>
</head>
<body>
    <div class="header">
        <h1>hook-sink</h1>
        <div style="display:flex;align-items:center;gap:16px;">
            <div class="auto-refresh"><span class="dot"></span> Auto-refresh</div>
            <div class="stats" id="stats">Loading...</div>
        </div>
    </div>
    <div class="container">
        <div class="sidebar">
            <div class="controls">
                <input type="text" id="search" placeholder="Search path or body...">
                <select id="methodFilter">
                    <option value="">All</option>
                    <option>POST</option>
                    <option>PUT</option>
                    <option>PATCH</option>
                    <option>DELETE</option>
                    <option>GET</option>
                </select>
                <button class="danger" onclick="clearAll()">Clear</button>
            </div>
            <div id="webhook-list"></div>
        </div>
        <div class="main" id="detail">
            <div class="empty-state">
                <h2>No webhook selected</h2>
                <p>Send a webhook to start capturing:</p>
                <br>
                <code>curl -X POST http://localhost:8765/hook/test -H "Content-Type: application/json" -d '{"event":"test"}'</code>
            </div>
        </div>
    </div>

    <script>
        let currentId = null;
        let webhooks = [];

        async function fetchWebhooks() {
            const search = document.getElementById('search').value;
            const method = document.getElementById('methodFilter').value;
            let url = '/api/webhooks?limit=100';
            if (search) url += '&body_contains=' + encodeURIComponent(search);
            if (method) url += '&method=' + encodeURIComponent(method);
            const resp = await fetch(url);
            const data = await resp.json();
            webhooks = data.webhooks;
            document.getElementById('stats').textContent = `${data.total} webhook(s) captured`;
            renderList();
        }

        function renderList() {
            const list = document.getElementById('webhook-list');
            if (webhooks.length === 0) {
                list.innerHTML = '<div class="empty-state"><p>No webhooks captured yet</p></div>';
                return;
            }
            list.innerHTML = webhooks.map(w => `
                <div class="webhook-item ${w.id === currentId ? 'active' : ''}" onclick="selectWebhook('${w.id}')">
                    <span class="method method-${w.method}">${w.method}</span>
                    <span class="path">${w.path}</span>
                    <div class="meta">${w.timestamp_iso} &middot; ${formatBytes(w.body_size)} &middot; ${w.source_ip}</div>
                </div>
            `).join('');
        }

        async function selectWebhook(id) {
            currentId = id;
            renderList();
            const resp = await fetch(`/api/webhooks/${id}`);
            const w = await resp.json();
            const bodyDisplay = w.body_json ? JSON.stringify(w.body_json, null, 2) : w.body;
            const headersHtml = Object.entries(w.headers).map(([k,v]) =>
                `<tr><td>${escapeHtml(k)}</td><td>${escapeHtml(v)}</td></tr>`
            ).join('');
            const providerBadge = w.provider ? `<span class="badge badge-provider">${w.provider}</span>` : '';

            document.getElementById('detail').innerHTML = `
                <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;">
                    <span class="method method-${w.method}" style="font-size:14px;padding:4px 10px;">${w.method}</span>
                    <span style="font-family:monospace;font-size:16px;">${escapeHtml(w.path)}</span>
                    ${providerBadge}
                    <span style="color:#8b949e;font-size:13px;margin-left:auto;">${w.timestamp_iso}</span>
                </div>

                <div class="detail-section">
                    <h3>Headers <button class="copy-btn" onclick="copyText(${JSON.stringify(JSON.stringify(w.headers, null, 2))})">Copy</button></h3>
                    <table class="headers-table">${headersHtml}</table>
                </div>

                <div class="detail-section">
                    <h3>Body (${formatBytes(w.body_size)}) <button class="copy-btn" onclick="copyText(${JSON.stringify(bodyDisplay)})">Copy</button></h3>
                    <pre>${escapeHtml(bodyDisplay || '(empty)')}</pre>
                </div>

                ${Object.keys(w.query_params).length > 0 ? `
                <div class="detail-section">
                    <h3>Query Parameters</h3>
                    <pre>${escapeHtml(JSON.stringify(w.query_params, null, 2))}</pre>
                </div>
                ` : ''}

                <div class="detail-section">
                    <h3>Replay</h3>
                    <div class="replay-section">
                        <input type="text" id="replay-target" value="http://localhost:3000" placeholder="Target URL...">
                        <button class="replay-btn" onclick="replayWebhook('${w.id}')">Replay Webhook</button>
                        <div id="replay-result"></div>
                    </div>
                </div>
            `;
        }

        async function replayWebhook(id) {
            const target = document.getElementById('replay-target').value;
            const resp = await fetch(`/api/replay/${id}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({target})
            });
            const result = await resp.json();
            const el = document.getElementById('replay-result');
            const color = result.success ? '#238636' : '#f85149';
            el.innerHTML = `<div class="replay-result" style="border-left:3px solid ${color}">
                <strong>Status:</strong> ${result.status_code || 'Error'} &middot;
                <strong>Time:</strong> ${result.elapsed_ms}ms
                ${result.error ? '<br><strong>Error:</strong> ' + escapeHtml(result.error) : ''}
                ${result.response_body ? '<br><pre style="margin-top:8px;max-height:200px;overflow:auto">' + escapeHtml(result.response_body.substring(0, 1000)) + '</pre>' : ''}
            </div>`;
        }

        async function clearAll() {
            if (!confirm('Delete all captured webhooks?')) return;
            await fetch('/api/webhooks', {method: 'DELETE'});
            currentId = null;
            document.getElementById('detail').innerHTML = '<div class="empty-state"><h2>All cleared</h2></div>';
            fetchWebhooks();
        }

        function copyText(text) {
            navigator.clipboard.writeText(text).then(() => {
                // brief flash feedback would go here
            });
        }

        function formatBytes(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        // Auto-refresh every 3 seconds
        fetchWebhooks();
        document.getElementById('search').addEventListener('input', fetchWebhooks);
        document.getElementById('methodFilter').addEventListener('change', fetchWebhooks);
        setInterval(fetchWebhooks, 3000);
    </script>
</body>
</html>
